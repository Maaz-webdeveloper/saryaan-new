<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saryaan - Digital flow for smarter payments and financial access.</title>
    <meta name="description"
        content="Explore SARYAAN solutions for invoice infrastructure, payment orchestration, and supply chain finance built for GCC enterprises.">
    <link rel="icon" type="image/png" href="./transparent.png">
    <link rel="stylesheet" href="./src/output.css">
</head>

<body>
    <nav class="w-full bg-[#FCFCFC] shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">

            <a href="index.html" class="inline-flex items-center shrink-0 relative z-10" aria-label="Saryaan Home">
                <span
                    class="inline-flex h-12 sm:h-14 w-[140px] sm:w-[180px] overflow-hidden items-center justify-center">
                    <img src="./transparent.png" alt="Saryaan"
                        class="block w-full h-full object-contain scale-[1.9] sm:scale-[2.1] origin-center" />
                </span>
            </a>

            <div class="hidden lg:flex items-center gap-10 text-[15px]">
                <a href="index.html" class="font-medium text-slate-600 hover:text-[#007C84] transition-colors">Home</a>
                <a href="solutions.html" class="font-bold text-[#007C84]">Solutions</a>
                <a href="partners.html"
                    class="font-medium text-slate-600 hover:text-[#007C84] transition-colors">Partners</a>
                <a href="contact.html"
                    class="font-medium text-slate-600 hover:text-[#007C84] transition-colors">Contact</a>
            </div>

            <div class="hidden lg:flex items-center gap-4">
                <a href="contact.html" class="px-7 py-2.5 rounded-full text-sm font-bold bg-[#0B1E3B] text-white 
               shadow-[0_4px_14px_0_rgba(11,30,59,0.35)] hover:bg-[#007C84] 
               hover:shadow-[0_6px_20px_rgba(0,124,132,0.32)] hover:-translate-y-0.5 
               transition-all duration-300 active:scale-95">
                    Request Demo
                </a>
            </div>

            <button class="lg:hidden p-2 text-[#0B1E3B] focus:outline-none" onclick="toggleMenu()" id="menu-btn">
                <svg id="menu-icon" class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
        </div>

        <div id="mobile-menu"
            class="hidden lg:hidden bg-white border-t border-slate-100 absolute w-full left-0 shadow-2xl z-50 transition-all duration-300">
            <div class="px-6 py-8 flex flex-col gap-6">
                <a href="index.html"
                    class="text-lg font-semibold text-slate-700 hover:text-[#007C84] transition-colors">Home</a>
                <a href="solutions.html" class="text-lg font-bold text-[#007C84]">Solutions</a>
                <a href="partners.html"
                    class="text-lg font-semibold text-slate-700 hover:text-[#007C84] transition-colors">Partners</a>
                <a href="contact.html"
                    class="text-lg font-semibold text-slate-700 hover:text-[#007C84] transition-colors">Contact</a>

                <div class="flex flex-col gap-4 pt-4 border-t border-slate-50">

                    <a href="contact.html"
                        class="w-full h-12 rounded-full font-bold bg-[#0B1E3B] text-white shadow-[0_4px_14px_0_rgba(11,30,59,0.35)] 
                         hover:bg-[#007C84] hover:shadow-[0_6px_20px_rgba(0,124,132,0.32)] active:scale-95 active:-translate-y-0.5 transition-all duration-300 inline-flex items-center justify-center">
                        Request Demo
                    </a>

                </div>
            </div>
        </div>
    </nav>

    <script>
        function toggleMenu() {
            const menu = document.getElementById("mobile-menu");
            if (!menu) return;
            menu.classList.toggle("hidden");
        }
    </script>

    <section class="w-full py-20" style="background:#F4F7FA;">
        <div class="max-w-7xl mx-auto px-6">
            <div class="reveal-item">
                <p class="text-sm font-semibold mb-2" style="color:#007C84;">Our Solutions</p>
                <h2 class="text-4xl font-bold mb-16" style="color:#0B1E3B;">Powering the Flow of Business Capital Across
                    the GCC</h2>
            </div>

            <div class="flex flex-col lg:flex-row gap-12 items-start">
                <div id="svg-container"
                    class="w-full lg:w-5/12 flex justify-center items-center reveal-left svg-entrance"
                    style="min-height:340px;">
                    <div class="relative flex justify-center items-center" style="width:300px;height:300px;">
                        <svg viewBox="0 0 300 300" width="300" height="300" style="position:absolute;">
                            <path id="seg0" d="M150,150 L150,20 A130,130 0 0,1 262,215 Z" fill="#007C84"
                                onclick="switchSolution(0)" style="cursor:pointer;transition:fill 0.3s;" />
                            <path id="seg1" d="M150,150 L262,215 A130,130 0 0,1 38,215 Z" fill="#0B1E3B"
                                onclick="switchSolution(1)" style="cursor:pointer;transition:fill 0.3s;" />
                            <path id="seg2" d="M150,150 L38,215 A130,130 0 0,1 150,20 Z" fill="#E2E8F0"
                                onclick="switchSolution(2)" style="cursor:pointer;transition:fill 0.3s;" />
                            <circle cx="150" cy="150" r="75" fill="white" />
                        </svg>
                        <div class="relative z-10 text-center">
                            <div id="center-icon" class="flex items-center justify-center rounded-full mx-auto mb-2"
                                style="width:48px;height:48px;background:#007C84;">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" fill="none"
                                    viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                        d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 11h.01M12 11h.01M15 11h.01M9 15h.01M12 15h.01M15 15h.01M5 3h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z" />
                                </svg>
                            </div>
                            <p class="text-xs font-bold" style="color:#0B1E3B;">Your<br />Business</p>
                        </div>
                    </div>
                </div>

                <div class="w-full lg:w-7/12 reveal-item" style="transition-delay: 0.2s;">
                    <div class="flex items-center gap-3 mb-6">
                        <div id="sol-badge" class="flex items-center justify-center rounded-full"
                            style="width:40px;height:40px;background:rgba(0,124,132,0.15);border:2px solid #007C84;">
                            <div id="sol-dot" class="rounded-full" style="width:14px;height:14px;background:#007C84;">
                            </div>
                        </div>
                        <div>
                            <h3 id="sol-title" class="text-xl font-bold" style="color:#0B1E3B;">Invoice Infrastructure
                                Engine</h3>
                            <p id="sol-sub" class="text-sm" style="color:#64748b;">Convert static invoices into
                                compliant finance-ready digital assets</p>
                        </div>
                    </div>

                    <div class="flex flex-col md:flex-row gap-6">
                        <div class="w-full md:w-1/2" id="items-list"></div>
                        <div class="w-full md:w-1/2 bg-white rounded-2xl p-6 shadow-sm" id="desc-panel"
                            style="border:1px solid rgba(0,124,132,0.2);">
                            <p id="desc-title" class="text-sm font-semibold mb-3" style="color:#007C84;"></p>
                            <p id="desc-text" class="text-sm leading-relaxed" style="color:#475569;"></p>
                        </div>
                    </div>

                    <div class="flex gap-3 mt-8 flex-wrap">
                        <button onclick="switchSolution(0)" id="tab0"
                            class="px-5 py-2.5 rounded-full text-xs font-bold text-white transition-all"
                            style="background:#007C84; border:none;">Invoice Engine</button>
                        <button onclick="switchSolution(1)" id="tab1"
                            class="px-5 py-2.5 rounded-full text-xs font-bold transition-all"
                            style="background:white; color:#0B1E3B; border:2px solid #0B1E3B;">Payment Engine</button>
                        <button onclick="switchSolution(2)" id="tab2"
                            class="px-5 py-2.5 rounded-full text-xs font-bold transition-all"
                            style="background:white; color:#0B1E3B; border:2px solid #0B1E3B;">SCF Engine</button>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="./main.js"></script>
</body>

</html>
